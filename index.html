<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>醫院櫃檯多語溝通手冊</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f8; --surface:#fff; --accent:#0d6e9a; --accent2:#1a9e72;
    --accent3:#c0392b; --accent4:#7b52ab; --accent5:#d97b06; --pin:#f59e0b;
    --text:#1a2332; --text-sub:#5a6a7e; --border:#dde4ed; --tag-bg:#eaf4fb;
    --shadow:0 2px 16px rgba(13,110,154,0.09); --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

header{background:linear-gradient(135deg,#0d6e9a 0%,#0a4f70 100%);color:white;padding:18px 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(13,110,154,0.3);}
header h1{font-family:‘DM Serif Display’,serif;font-size:1.2rem;}
header p{font-size:0.72rem;opacity:0.7;margin-top:2px;font-weight:300;}

.lang-bar{background:white;border-bottom:1px solid var(–border);padding:10px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:68px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.lang-bar::-webkit-scrollbar{display:none;}
.lang-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:50px;border:1.5px solid var(–border);background:white;color:var(–text-sub);font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.18s;font-family:‘DM Sans’,sans-serif;}
.lang-btn .flag{font-size:1.05rem;}
.lang-btn.active-en {background:#1565c0;color:white;border-color:#1565c0;box-shadow:0 2px 10px rgba(21,101,192,0.3);}
.lang-btn.active-fil{background:#c62828;color:white;border-color:#c62828;box-shadow:0 2px 10px rgba(198,40,40,0.3);}
.lang-btn.active-vi {background:#2e7d32;color:white;border-color:#2e7d32;box-shadow:0 2px 10px rgba(46,125,50,0.3);}
.lang-btn.active-th {background:#4527a0;color:white;border-color:#4527a0;box-shadow:0 2px 10px rgba(69,39,160,0.3);}
.lang-btn.active-id {background:#e65100;color:white;border-color:#e65100;box-shadow:0 2px 10px rgba(230,81,0,0.3);}

.search-wrap{position:sticky;top:116px;z-index:98;background:var(–bg);padding:12px 14px 6px;}
.search-inner{position:relative;}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(–border);border-radius:50px;font-size:0.88rem;font-family:‘DM Sans’,sans-serif;background:white;outline:none;color:var(–text);box-shadow:var(–shadow);transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(–accent);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(–text-sub);font-size:0.95rem;pointer-events:none;}

.tabs{display:flex;gap:7px;padding:8px 14px 10px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:5px 12px;border-radius:50px;font-size:0.75rem;font-weight:500;cursor:pointer;border:1.5px solid transparent;background:white;color:var(–text-sub);transition:all 0.18s;box-shadow:0 1px 5px rgba(0,0,0,0.06);}
.tab.active{background:var(–accent);color:white;border-color:var(–accent);box-shadow:0 2px 8px rgba(13,110,154,0.28);}
.tab.pin-tab{border-color:var(–pin);color:var(–pin);}
.tab.pin-tab.active{background:var(–pin);color:white;border-color:var(–pin);box-shadow:0 2px 8px rgba(245,158,11,0.3);}

.pinned-section{margin:10px 14px 0;background:#fffbeb;border:1.5px solid #fde68a;border-radius:var(–radius);padding:12px 14px 6px;}
.pinned-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pinned-title{font-family:‘DM Serif Display’,serif;font-size:0.95rem;color:#92400e;}
.pinned-count{margin-left:auto;font-size:0.7rem;color:#b45309;background:#fde68a;padding:2px 8px;border-radius:20px;}

.section{padding:0 14px 4px;}
.section-header{display:flex;align-items:center;gap:9px;padding:12px 0 8px;}
.section-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.section-title{font-family:‘DM Serif Display’,serif;font-size:1rem;color:var(–text);}
.section-count{margin-left:auto;font-size:0.7rem;color:var(–text-sub);background:var(–border);padding:2px 8px;border-radius:20px;}

.phrase-card{background:var(–surface);border-radius:var(–radius);padding:13px 14px 12px;margin-bottom:9px;box-shadow:var(–shadow);border:1px solid var(–border);position:relative;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
.phrase-card.is-pinned{border-color:#fcd34d;box-shadow:0 2px 16px rgba(245,158,11,0.15);}
.phrase-card::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3.5px;border-radius:3px 0 0 3px;}
.cat-0::before{background:#1565c0;} .cat-1::before{background:#1a9e72;} .cat-2::before{background:#c0392b;}
.cat-3::before{background:#7b52ab;} .cat-4::before{background:#d97b06;} .cat-5::before{background:#e91e63;}
.cat-6::before{background:#00897b;} .cat-7::before{background:#0288d1;} .cat-8::before{background:#558b2f;}
.cat-9::before{background:#6d4c41;} .cat-10::before{background:#37474f;} .pinned-card::before{background:#f59e0b;}
.icon-0{background:#eaf4fb;} .icon-1{background:#e6f7f2;} .icon-2{background:#fdecea;}
.icon-3{background:#f3eefb;} .icon-4{background:#fef3e2;} .icon-5{background:#fce4ec;}
.icon-6{background:#e0f2f1;} .icon-7{background:#e1f5fe;} .icon-8{background:#f1f8e9;}
.icon-9{background:#efebe9;} .icon-10{background:#eceff1;}

.lang-badge{display:inline-block;font-size:0.62rem;font-weight:600;padding:1px 7px;border-radius:20px;margin-bottom:5px;letter-spacing:0.04em;}
.badge-en{background:#e3eeff;color:#1565c0;} .badge-fil{background:#fdecea;color:#c62828;}
.badge-vi{background:#e8f5e9;color:#2e7d32;} .badge-th{background:#ede7f6;color:#4527a0;}
.badge-id{background:#fff3e0;color:#e65100;}

.phrase-main{font-size:0.9rem;font-weight:600;color:var(–text);line-height:1.5;padding-right:90px;}
.phrase-zh{font-size:0.73rem;color:var(–text-sub);margin-top:5px;line-height:1.35;}

.btn-row{position:absolute;right:10px;top:10px;display:flex;gap:4px;}
.action-btn{width:27px;height:27px;border-radius:8px;background:var(–tag-bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.82rem;transition:background 0.15s,transform 0.15s;color:var(–accent);}
.action-btn:active{transform:scale(0.88);}
.action-btn:hover{background:#d0e9f7;}
.action-btn.copied{background:#d4f5e9;color:var(–accent2);}
.action-btn.speaking{background:#fde8d0;color:var(–accent5);}
.pin-btn{background:#fef9ee;color:#d97706;}
.pin-btn:hover{background:#fef3c7;}
.pin-btn.pinned{background:#fde68a;color:#92400e;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2332;color:white;padding:9px 18px;border-radius:50px;font-size:0.8rem;opacity:0;transition:all 0.28s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.divider{height:1px;background:var(–border);margin:4px 14px 0;}
.no-result{text-align:center;color:var(–text-sub);padding:40px 20px;font-size:0.88rem;}
</style>

</head>
<body>

<header>
  <h1>🏥 醫院櫃檯多語溝通手冊</h1>
  <p>Hospital Reception — Multilingual Phrase Guide</p>
</header>

<div class="lang-bar">
  <button class="lang-btn active-en" data-lang="en"  onclick="setLang('en',this)"><span class="flag">🇺🇸</span>英文</button>
  <button class="lang-btn"           data-lang="fil" onclick="setLang('fil',this)"><span class="flag">🇵🇭</span>菲律賓文</button>
  <button class="lang-btn"           data-lang="vi"  onclick="setLang('vi',this)"><span class="flag">🇻🇳</span>越南文</button>
  <button class="lang-btn"           data-lang="th"  onclick="setLang('th',this)"><span class="flag">🇹🇭</span>泰文</button>
  <button class="lang-btn"           data-lang="id"  onclick="setLang('id',this)"><span class="flag">🇮🇩</span>印尼文</button>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋句子或關鍵字…" oninput="filterPhrases(this.value)">
  </div>
</div>

<div class="tabs" id="tabsContainer"></div>
<div id="pinnedSection"></div>
<div id="content"></div>
<div class="toast" id="toast"></div>

<script>
const langMeta = {
  en:  {label:"English",          flag:"🇺🇸",tts:"en-US", badge:"badge-en"},
  fil: {label:"Filipino",         flag:"🇵🇭",tts:"fil-PH",badge:"badge-fil"},
  vi:  {label:"Tiếng Việt",       flag:"🇻🇳",tts:"vi-VN", badge:"badge-vi"},
  th:  {label:"ภาษาไทย",           flag:"🇹🇭",tts:"th-TH", badge:"badge-th"},
  id:  {label:"Bahasa Indonesia", flag:"🇮🇩",tts:"id-ID", badge:"badge-id"},
};

const data = [
  // 0
  {cat:"掛號 / 接待",icon:"📋",phrases:[
    {zh:"早安/午安，請問有什麼需要幫忙？",en:"Good morning / Good afternoon. How can I help you?",fil:"Magandang umaga / hapon. Paano kita matutulungan?",vi:"Chào buổi sáng / buổi chiều. Tôi có thể giúp gì cho bạn?",th:"สวัสดีครับ/ค่ะ ช่วยอะไรได้บ้างครับ/ค่ะ?",id:"Selamat pagi / siang. Ada yang bisa saya bantu?"},
    {zh:"您今天有預約嗎？",en:"Do you have an appointment today?",fil:"Mayroon ka bang appointment ngayon?",vi:"Hôm nay bạn có hẹn trước không?",th:"คุณมีนัดล่วงหน้าวันนี้ไหมครับ/ค่ะ?",id:"Apakah Anda sudah membuat janji hari ini?"},
    {zh:"請問您的姓名？",en:"May I have your name, please?",fil:"Puwede ko bang malaman ang iyong pangalan?",vi:"Cho tôi biết tên của bạn được không?",th:"ขอทราบชื่อของคุณได้ไหมครับ/ค่ะ?",id:"Boleh saya tahu nama Anda?"},
    {zh:"可以請您出示身分證或健保卡嗎？",en:"May I see your ID or health insurance card?",fil:"Maaari ko bang makita ang iyong ID o health insurance card?",vi:"Bạn có thể cho tôi xem CMND hoặc thẻ bảo hiểm y tế không?",th:"ขอดูบัตรประชาชนหรือบัตรประกันสุขภาพของคุณได้ไหมครับ/ค่ะ?",id:"Boleh saya lihat KTP atau kartu asuransi kesehatan Anda?"},
    {zh:"您今天要看哪個科別？",en:"Which department are you here to see today?",fil:"Aling departamento ang gusto mong puntahan ngayon?",vi:"Hôm nay bạn muốn khám ở khoa nào?",th:"วันนี้คุณต้องการพบแผนกไหนครับ/ค่ะ?",id:"Hari ini Anda ingin ke poli/bagian mana?"},
    {zh:"請您填寫這張掛號單。",en:"Please fill in this registration form.",fil:"Pakipunan ang registration form na ito.",vi:"Vui lòng điền vào mẫu đăng ký này.",th:"กรุณากรอกแบบฟอร์มลงทะเบียนนี้ด้วยครับ/ค่ะ",id:"Mohon isi formulir pendaftaran ini."},
    {zh:"您的號碼牌是[號碼]，請先坐下等候。",en:"Your queue number is [number]. Please have a seat and wait.",fil:"Ang iyong numero sa pila ay [number]. Mangyaring umupo at maghintay.",vi:"Số thứ tự của bạn là [số]. Vui lòng ngồi xuống và chờ.",th:"หมายเลขคิวของคุณคือ [หมายเลข] กรุณานั่งรอได้เลยครับ/ค่ะ",id:"Nomor antrean Anda adalah [nomor]. Silakan duduk dan menunggu."},
    {zh:"醫師很快就會看診。",en:"The doctor will see you shortly.",fil:"Malalaman ka ng doktor sa ilang sandali.",vi:"Bác sĩ sẽ gặp bạn ngay.",th:"แพทย์จะพบคุณในไม่ช้าครับ/ค่ะ",id:"Dokter akan segera menemui Anda."},
  ]},
  // 1
  {cat:"病歷 / 基本資料",icon:"📝",phrases:[
    {zh:"請問您的出生年月日？",en:"May I have your date of birth?",fil:"Ano ang iyong petsa ng kapanganakan?",vi:"Cho tôi biết ngày tháng năm sinh của bạn?",th:"ขอวันเดือนปีเกิดของคุณได้ไหมครับ/ค่ะ?",id:"Boleh saya tahu tanggal lahir Anda?"},
    {zh:"請問您的聯絡電話？",en:"May I have your contact phone number?",fil:"Ano ang iyong contact number?",vi:"Cho tôi biết số điện thoại liên lạc của bạn?",th:"ขอหมายเลขโทรศัพท์ติดต่อของคุณได้ไหมครับ/ค่ะ?",id:"Boleh saya tahu nomor telepon Anda?"},
    {zh:"請問您的地址？",en:"May I have your address?",fil:"Ano ang iyong address?",vi:"Cho tôi biết địa chỉ của bạn?",th:"ขอที่อยู่ของคุณได้ไหมครับ/ค่ะ?",id:"Boleh saya tahu alamat Anda?"},
    {zh:"這是您第一次來本院就診嗎？",en:"Is this your first visit to our hospital?",fil:"Ito ba ang iyong unang pagbisita sa aming ospital?",vi:"Đây có phải lần đầu tiên bạn đến bệnh viện chúng tôi không?",th:"นี่เป็นการมาพบแพทย์ครั้งแรกที่โรงพยาบาลของเราไหมครับ/ค่ะ?",id:"Apakah ini kunjungan pertama Anda ke rumah sakit kami?"},
    {zh:"請問是本人就診，還是陪同家屬？",en:"Are you here as a patient, or accompanying a family member?",fil:"Ikaw ba ang pasyente, o sinasamahan mo ang isang miyembro ng pamilya?",vi:"Bạn là bệnh nhân hay đang đi cùng người thân?",th:"คุณมาในฐานะผู้ป่วยหรือมาพร้อมกับสมาชิกครอบครัวครับ/ค่ะ?",id:"Apakah Anda pasien atau menemani anggota keluarga?"},
  ]},
  // 2
  {cat:"症狀詢問",icon:"🩺",phrases:[
    {zh:"您哪裡不舒服？",en:"Where do you feel uncomfortable?",fil:"Saan ka nahihirapan o sumasakit?",vi:"Bạn cảm thấy không khỏe ở đâu?",th:"คุณรู้สึกไม่สบายที่ไหนครับ/ค่ะ?",id:"Di mana Anda merasa tidak nyaman?"},
    {zh:"症狀從什麼時候開始？",en:"When did the symptoms start?",fil:"Kailan nagsimula ang mga sintomas?",vi:"Các triệu chứng bắt đầu từ khi nào?",th:"อาการเริ่มเมื่อเมื่อไรครับ/ค่ะ?",id:"Sejak kapan gejala ini mulai muncul?"},
    {zh:"您有在服用其他藥物嗎？",en:"Are you currently taking any other medications?",fil:"Umiinom ka ba ng ibang mga gamot ngayon?",vi:"Bạn có đang dùng thuốc nào khác không?",th:"คุณกำลังรับประทานยาอื่นอยู่ไหมครับ/ค่ะ?",id:"Apakah Anda sedang mengonsumsi obat lain?"},
    {zh:"您有慢性病病史嗎？（如高血壓、糖尿病）",en:"Do you have any chronic conditions, such as hypertension or diabetes?",fil:"Mayroon ka bang chronic na sakit tulad ng hypertension o diabetes?",vi:"Bạn có bệnh mãn tính không, chẳng hạn như tăng huyết áp hoặc tiểu đường?",th:"คุณมีโรคเรื้อรังไหมครับ/ค่ะ เช่น ความดันโลหิตสูงหรือเบาหวาน?",id:"Apakah Anda memiliki penyakit kronis seperti hipertensi atau diabetes?"},
    {zh:"您最近有發燒嗎？",en:"Have you had a fever recently?",fil:"Nagkaroon ka ba ng lagnat kamakailan?",vi:"Gần đây bạn có bị sốt không?",th:"เมื่อเร็วๆ นี้คุณมีไข้ไหมครับ/ค่ะ?",id:"Apakah Anda baru-baru ini mengalami demam?"},
    {zh:"您有藥物過敏嗎？",en:"Do you have any allergies to medications?",fil:"Mayroon ka bang allergy sa anumang gamot?",vi:"Bạn có bị dị ứng với thuốc nào không?",th:"คุณแพ้ยาชนิดใดบ้างไหมครับ/ค่ะ?",id:"Apakah Anda memiliki alergi terhadap obat-obatan?"},
  ]},
  // 3
  {cat:"緊急 / 急診",icon:"🚨",phrases:[
    {zh:"這是緊急狀況嗎？",en:"Is this an emergency?",fil:"Emergency ba ito?",vi:"Đây có phải trường hợp khẩn cấp không?",th:"นี่เป็นกรณีฉุกเฉินไหมครับ/ค่ะ?",id:"Apakah ini keadaan darurat?"},
    {zh:"請立刻前往急診室。",en:"Please go to the emergency room right away.",fil:"Mangyaring pumunta agad sa emergency room.",vi:"Vui lòng đến phòng cấp cứu ngay.",th:"กรุณาไปห้องฉุกเฉินทันทีครับ/ค่ะ",id:"Silakan pergi ke IGD segera."},
    {zh:"您現在有疼痛感嗎？",en:"Are you in pain right now?",fil:"Mayroon ka bang nararamdamang sakit ngayon?",vi:"Bạn có đang bị đau không?",th:"ตอนนี้คุณรู้สึกเจ็บปวดไหมครับ/ค่ะ?",id:"Apakah Anda sedang merasakan nyeri sekarang?"},
    {zh:"疼痛程度從1到10，您覺得是幾分？",en:"On a scale of 1 to 10, how bad is the pain?",fil:"Sa sukat na 1 hanggang 10, gaano katindi ang sakit?",vi:"Theo thang điểm 1 đến 10, mức độ đau của bạn là bao nhiêu?",th:"ในระดับ 1 ถึง 10 ความเจ็บปวดอยู่ที่เท่าไรครับ/ค่ะ?",id:"Dalam skala 1 sampai 10, seberapa parah sakitnya?"},
    {zh:"請保持冷靜，協助馬上就來。",en:"Please stay calm. Help is on the way.",fil:"Mangyaring manatiling kalmado. Paparating na ang tulong.",vi:"Xin hãy bình tĩnh. Sự trợ giúp đang trên đường đến.",th:"กรุณาใจเย็นๆ ความช่วยเหลือกำลังมาครับ/ค่ะ",id:"Harap tetap tenang. Bantuan sedang dalam perjalanan."},
  ]},
  // 4
  {cat:"等候 / 說明",icon:"⏳",phrases:[
    {zh:"抱歉讓您久等，大約還需要[X]分鐘。",en:"I'm sorry for the wait. It will be about [X] more minutes.",fil:"Paumanhin sa paghihintay. Mga [X] pang minuto.",vi:"Xin lỗi vì đã để bạn chờ. Còn khoảng [X] phút nữa.",th:"ขอโทษที่ต้องรอนานครับ/ค่ะ อีกประมาณ [X] นาที",id:"Maaf atas penantiannya. Sekitar [X] menit lagi."},

// ── State ─────────────────────────────────────────────────────────────────────
let activeLang='en', activeTab='all';
const colors=['cat-0','cat-1','cat-2','cat-3','cat-4','cat-5','cat-6','cat-7','cat-8','cat-9','cat-10'];
const iconColors=['icon-0','icon-1','icon-2','icon-3','icon-4','icon-5','icon-6','icon-7','icon-8','icon-9','icon-10'];

function phraseKey(p){return'pin_'+p.zh;}
function getPinned(){try{return JSON.parse(localStorage.getItem('hospital_pins')||'[]');}catch{return[];}}
function savePinned(arr){try{localStorage.setItem('hospital_pins',JSON.stringify(arr));}catch{}}
function isPinned(p){return getPinned().includes(phraseKey(p));}
function togglePin(p){let pins=getPinned();const k=phraseKey(p);pins=pins.includes(k)?pins.filter(x=>x!==k):[...pins,k];savePinned(pins);}
function findPhrase(zh){for(const s of data)for(const p of s.phrases)if(p.zh===zh)return p;return null;}

function setLang(lang,el){activeLang=lang;document.querySelectorAll('.lang-btn').forEach(b=>b.className='lang-btn');el.className='lang-btn active-'+lang;render();}

function renderTabs(){
  const c=document.getElementById('tabsContainer');
  c.innerHTML=
    `<div class="tab pin-tab${activeTab==='pinned'?' active':''}" onclick="setTab('pinned',this)">⭐ 釘選</div>`+
    `<div class="tab${activeTab==='all'?' active':''}" onclick="setTab('all',this)">全部</div>`+
    data.map((d,i)=>`<div class="tab${activeTab===i?' active':''}" onclick="setTab(${i},this)">${d.icon} ${d.cat.split('/')[0].trim()}</div>`).join('');
}

function setTab(idx,el){activeTab=idx;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}

function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function buildCard(phrase,catIdx,inPinnedSection){
  const meta=langMeta[activeLang];
  const mainText=phrase[activeLang]||phrase.en;
  const pinned=isPinned(phrase);
  const cardCls=inPinnedSection?'phrase-card pinned-card':`phrase-card ${colors[catIdx%colors.length]}${pinned?' is-pinned':''}`;
  return `<div class="${cardCls}">
    <div class="btn-row">
      <button class="action-btn pin-btn${pinned?' pinned':''}" title="${pinned?'取消釘選':'釘選'}" onclick="handlePin(this,'${esc(phrase.zh)}')">${pinned?'📌':'📍'}</button>
      <button class="action-btn" onclick="speak(this,'${esc(mainText)}','${activeLang}')">🔊</button>
      <button class="action-btn" onclick="copyText(this,'${esc(mainText)}')">📋</button>
    </div>
    <span class="lang-badge ${meta.badge}">${meta.flag} ${meta.label}</span>
    <div class="phrase-main">${mainText}</div>
    <div class="phrase-zh">📌 ${phrase.zh}</div>
  </div>`;
}

function handlePin(btn,zh){
  const phrase=findPhrase(zh);if(!phrase)return;
  togglePin(phrase);
  const pinned=isPinned(phrase);
  btn.textContent=pinned?'📌':'📍';
  btn.className=`action-btn pin-btn${pinned?' pinned':''}`;
  btn.title=pinned?'取消釘選':'釘選';
  const card=btn.closest('.phrase-card');
  if(card){pinned?card.classList.add('is-pinned'):card.classList.remove('is-pinned');}
  showToast(pinned?'⭐ 已釘選！':'取消釘選');
  renderPinned();
}

function renderPinned(){
  const container=document.getElementById('pinnedSection');
  if(activeTab==='pinned'){container.innerHTML='';return;}
  const pins=getPinned();
  if(!pins.length){container.innerHTML='';return;}
  const list=pins.map(k=>findPhrase(k.replace(/^pin_/,''))).filter(Boolean);
  if(!list.length){container.innerHTML='';return;}
  container.innerHTML=`<div class="pinned-section">
    <div class="pinned-header"><div class="pinned-title">⭐ 我的釘選</div><div class="pinned-count">${list.length} 句</div></div>
    ${list.map(p=>buildCard(p,0,true)).join('')}
  </div><div class="divider"></div>`;
}

function renderContent(query=''){
  const container=document.getElementById('content');
  const q=query.toLowerCase();
  if(activeTab==='pinned'){
    const list=getPinned().map(k=>findPhrase(k.replace(/^pin_/,''))).filter(Boolean);
    const filtered=q?list.filter(p=>(p[activeLang]||p.en).toLowerCase().includes(q)||p.zh.includes(query)):list;
    container.innerHTML=filtered.length
      ?`<div class="section"><div class="section-header"><div class="section-icon" style="background:#fef3c7">⭐</div><div class="section-title">我的釘選</div><div class="section-count">${filtered.length} 句</div></div>${filtered.map(p=>buildCard(p,0,true)).join('')}</div>`
      :`<div class="no-result">⭐ 還沒有釘選的句子<br><span style="font-size:0.8rem;opacity:0.6">點每張卡片上的 📍 即可釘選</span></div>`;
    return;
  }
  let html='',found=0;
  data.forEach((section,i)=>{
    if(activeTab!=='all'&&activeTab!==i)return;
    const filtered=q?section.phrases.filter(p=>(p[activeLang]||p.en).toLowerCase().includes(q)||p.zh.includes(query)):section.phrases;
    if(!filtered.length)return;
    found+=filtered.length;
    html+=`<div class="section"><div class="section-header"><div class="section-icon ${iconColors[i%iconColors.length]}">${section.icon}</div><div class="section-title">${section.cat}</div><div class="section-count">${filtered.length} 句</div></div>${filtered.map(p=>buildCard(p,i,false)).join('')}</div><div class="divider"></div>`;
  });
  container.innerHTML=found?html:`<div class="no-result">😕 找不到相關句子，請嘗試其他關鍵字</div>`;
}

function render(){renderTabs();renderPinned();renderContent(document.getElementById('searchInput').value);}
function filterPhrases(q){renderPinned();renderContent(q);}

function copyText(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');btn.textContent='✅';showToast('已複製！');
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋';},1800);
  });
}
function speak(btn,text,lang){
  if(!('speechSynthesis' in window)){showToast('此裝置不支援語音');return;}
  window.speechSynthesis.cancel();btn.classList.add('speaking');btn.textContent='🔈';
  const u=new SpeechSynthesisUtterance(text);u.lang=langMeta[lang]?.tts||'en-US';u.rate=0.88;
  u.onend=()=>{btn.classList.remove('speaking');btn.textContent='🔊';};
  window.speechSynthesis.speak(u);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

render();
</script>
